name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          autocrlf: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Check code formatting
        run: zig fmt --check .

      - name: Build and run tests
        run: zig build test